<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ajax-site</title>
    <link rel="stylesheet" href="main.css" />
    <script src="main.js"></script>
  </head>
  <body>
    <!-- 탭 메뉴 -->
    <div class="tab-menu">
      <button class="tab-btn active" data-tab="all">전체</button>
      <button class="tab-btn" data-tab="pc">PC</button>
      <button class="tab-btn" data-tab="mobile">MOBILE</button>
    </div>
    <!-- 상품 리스트 -->
    <div id="wrap">
      <!-- js 출력 -->
      <div class="card">
        <!-- 할인 뱃지 -->
        <span class="sale-badge"> 20% OFF </span>
        <!-- 이미지 -->
        <img src="" alt="" />
        <div class="text">
          <!-- 상품명 -->
          <h2></h2>
          <!-- 설명 -->
          <p class="desc"></p>
          <!-- 가격 -->
          <div class="price-box">
            <!-- 원래 가격 -->
            <p class="origin-price"></p>
            <!-- 할인 가격 -->
            <p class="sale-price"></p>
          </div>
          <!-- 버튼 -->
          <button class="buy-btn">구매하기</button>
        </div>
      </div>
    </div>
  </body>
</html>
