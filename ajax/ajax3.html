<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div id="wrap">
      <script>
        // 1. 하이픈(-)을 이퀄(=)로 수정
        const wrap = document.querySelector("#wrap");

        // 서버 요청 객체
        const xhr = new XMLHttpRequest();

        // json 요청
        xhr.open("GET", "data3.json", true);

        xhr.onload = function () {
          if (xhr.status === 200) {
            const data = JSON.parse(xhr.responseText);
            console.log(data);

            // 2. foreach를 forEach로 수정
            data.forEach(function (item) {
              // 3. 출력할 대상(item) 추가
              console.log(item);
              wrap.innerHTML +=
                `<div class="card">
            <h2> ${item.title}</h2>
            <img src="${item.img}" alt="${item.alt}">
        </div>`;
            });
          }
        };

        // 4. 서버에 실제 요청을 보내는 send() 추가
        xhr.send();
      </script>
    </div>
  </body>
</html>
